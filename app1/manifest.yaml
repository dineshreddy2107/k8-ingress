apiVersion: apps/v1
kind: Deployment
metadata: 
  name: app1
  # deployment labels
  labels:
    purpose: ingress
    project: roboshop
    app: app1
spec:
  replicas: 2
  # these are the labels replica set use to create pod replicas,this should match pod labels
  selector:
    matchLabels:
     purpose: ingress
     project: roboshop
     app: app1
# this is pod definition
  template:
    metadata:
      labels:
       purpose: ingress
       project: roboshop
       app: app1
    spec:
      containers:
      - name: app1
        image: dineshreddy11/app1:v1
---
apiVersion: v1
kind: Service
metadata:
  name: app1
  labels:
    purpose: ingress
spec:
  selector:
   purpose: ingress
   project: roboshop
   app: app1
  ports:
    - protocol: TCP
      port: 80  # service port
      targetPort: 80  # container port
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ingress-wildcard-host
  annotations:
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS": 443}]'
    alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:us-east-1:315949462026:certificate/b04a0383-deea-4e4c-adcd-4a3caa77e426
    alb.ingress.kubernetes.io/scheme: internet-facing 
    alb.ingress.kubernetes.io/target-type: ip
spec:
  rules:
  - host: "app1.vinnimakeovers.online"
    http:
      paths:
      - pathType: Prefix
        path: "/"
        backend:
          service:
            name: app1
            port:
              number: 80
 
